<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentimentLens</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; }
        textarea { width: 100%; }
        button { margin-top: 10px; padding: 8px 20px; }
        .result { margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>
    <h2>📝 SentimentLens - 英文情感分析</h2>
    <form method="post">
        <textarea name="text" rows="4" placeholder="输入一段英文，例如：I love this!"></textarea><br>
        <button type="submit">分析情感</button>
    </form>
    {% if sentiment %}
        <div class="result"><strong>结果：</strong>{{ sentiment }}</div>
    {% endif %}
</body>
</html>
